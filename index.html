<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .add-expense-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .report-section {
            padding: 30px;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .month-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .month-picker select,
        .btn-refresh {
            padding: 8px;
            border-radius: 6px;
        }

        .btn-refresh {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .total-spent p {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        .text-center {
            text-align: center;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-wallet"></i> Personal Expense Tracker</h1>
        </header>

        <div class="add-expense-section">
            <h2>Add New Expense</h2>
            <form id="expenseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="amount" step="0.01" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="">-- Select Category --</option>
                            <option value="Food & Dining">🍔 Food & Dining</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Bills & Utilities">💡 Bills & Utilities</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Education">📚 Education</option>
                            <option value="Rent & Mortgage">🏠 Rent & Mortgage</option>
                            <option value="Travel">✈️ Travel</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="e.g., Groceries, Coffee">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                </div>
                <button type="submit" class="btn-add"><i class="fas fa-plus"></i> Add Expense</button>
            </form>
        </div>

        <div class="report-section">
            <div class="filter-bar">
                <h2>Monthly Report</h2>
                <div class="month-picker">
                    <select id="month"></select>
                    <select id="year"></select>
                    <button id="refreshReport" class="btn-refresh"><i class="fas fa-chart-line"></i> Generate
                        Report</button>
                </div>
            </div>

            <div class="stats-card">
                <div class="total-spent">
                    <h3>Total Expenses</h3>
                    <p id="totalAmount">$0.00</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>

            <div class="expenses-list">
                <h3>Expense Details</h3>
                <div class="table-wrapper">
                    <table id="expensesTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expensesBody">
                            <tr>
                                <td colspan="5" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let expenses = [];

        function loadFromStorage() {
            const stored = localStorage.getItem('expenses_tracker');
            if (stored) {
                try {
                    expenses = JSON.parse(stored);
                } catch (e) { console.error(e); }
            }
        }

        function saveToStorage() {
            localStorage.setItem('expenses_tracker', JSON.stringify(expenses));
        }

        function addExpense(amount, category, description, date) {
            const newExpense = {
                id: Date.now(),
                amount: parseFloat(amount),
                category: category,
                description: description.trim() || "",
                date: date
            };
            expenses.push(newExpense);
            saveToStorage();
            return true;
        }

        function deleteExpenseById(id) {
            expenses = expenses.filter(exp => exp.id !== id);
            saveToStorage();
            refreshDisplay();
        }

        function initDateSelectors() {
            const monthSelect = document.getElementById('month');
            const yearSelect = document.getElementById('year');
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1;

            for (let i = 1; i <= 12; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = new Date(2000, i - 1, 1).toLocaleString('default', { month: 'long' });
                if (i === currentMonth) option.selected = true;
                monthSelect.appendChild(option);
            }

            for (let y = currentYear - 3; y <= currentYear + 2; y++) {
                const option = document.createElement('option');
                option.value = y;
                option.textContent = y;
                if (y === currentYear) option.selected = true;
                yearSelect.appendChild(option);
            }
        }

        function getFilteredExpenses() {
            const month = parseInt(document.getElementById('month').value, 10);
            const year = document.getElementById('year').value;
            return expenses.filter(exp => {
                const [expYear, expMonth] = exp.date.split('-');
                return expYear === year && parseInt(expMonth, 10) === month;
            });
        }

        function displayExpensesTable(filtered) {
            const tbody = document.getElementById('expensesBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No expenses found for this month</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            filtered.forEach(exp => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = exp.date;
                row.insertCell(1).textContent = exp.description || '-';
                row.insertCell(2).textContent = exp.category;
                row.insertCell(3).textContent = `$${exp.amount.toFixed(2)}`;
                const actionCell = row.insertCell(4);
                const delBtn = document.createElement('button');
                delBtn.textContent = 'Delete';
                delBtn.className = 'delete-btn';
                delBtn.onclick = () => deleteExpenseById(exp.id);
                actionCell.appendChild(delBtn);
            });
        }

        function updateTotalAndChart(filtered) {
            const total = filtered.reduce((sum, exp) => sum + exp.amount, 0);
            document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;

            const catMap = new Map();
            filtered.forEach(exp => {
                catMap.set(exp.category, (catMap.get(exp.category) || 0) + exp.amount);
            });
            const labels = Array.from(catMap.keys());
            const data = Array.from(catMap.values());

            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            if (labels.length === 0) {
                window.myChart = new Chart(ctx, {
                    type: 'pie',
                    data: { labels: ['No data'], datasets: [{ data: [1], backgroundColor: ['#ccc'] }] },
                    options: { plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: () => 'No expenses' } } } }
                });
            } else {
                window.myChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', '#4CAF50', '#F06292', '#BA68C8']
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' }, title: { display: true, text: 'Category-wise Spending' } } }
                });
            }
        }

        function refreshDisplay() {
            const filtered = getFilteredExpenses();
            displayExpensesTable(filtered);
            updateTotalAndChart(filtered);
        }

        function handleAddExpense(e) {
            e.preventDefault();
            const amount = document.getElementById('amount').value;
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value;
            const date = document.getElementById('date').value;

            if (!amount || amount <= 0) { alert("Enter valid amount"); return; }
            if (!category) { alert("Select category"); return; }
            if (!date) { alert("Select date"); return; }

            if (addExpense(amount, category, description, date)) {
                document.getElementById('expenseForm').reset();
                document.getElementById('date').value = new Date().toISOString().split('T')[0];
                const [newYear, newMonth] = date.split('-');
                document.getElementById('year').value = newYear;
                document.getElementById('month').value = parseInt(newMonth, 10);
                refreshDisplay();
                alert("Expense added successfully!");
            } else {
                alert("Failed to add expense");
            }
        }

        loadFromStorage();
        initDateSelectors();
        refreshDisplay();

        document.getElementById('expenseForm').addEventListener('submit', handleAddExpense);
        document.getElementById('refreshReport').addEventListener('click', () => refreshDisplay());
    </script>
</body>

</html>
